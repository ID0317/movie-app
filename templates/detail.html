<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} - 豆瓣电影</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <a href="/" class="nav-brand">MovieApp</a>
            <div class="nav-links">
                <a href="/" class="nav-link">电影榜单</a>
                <a href="/news" class="nav-link">科技新闻</a>
                {% if current_user.is_authenticated %}
                <span class="nav-user">{{ current_user.username }}</span>
                <a href="/logout" class="nav-link">退出</a>
                {% else %}
                <a href="/login" class="nav-link">登录</a>
                <a href="/register" class="nav-link">注册</a>
                {% endif %}
            </div>
        </nav>

        <a href="/" class="back-link">← 返回列表</a>

        <div class="detail-card">
            <h1 class="detail-title">{{ movie.title }}</h1>

            <div class="detail-stats">
                <div class="stat">
                    <span class="stat-label">排名</span>
                    <span class="stat-value">No.{{ movie.rank }}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">评分</span>
                    <span class="stat-value rating-big">{{ movie.rating }}</span>
                </div>
                <div class="stat">
                    <span class="stat-label">评价人数</span>
                    <span class="stat-value">{{ movie.rating_people }} 人</span>
                </div>
            </div>

            {% if movie.quote %}
            <div class="detail-quote">
                <p>{{ movie.quote }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
